<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rikkei Cinema - Đăng ký</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../css/register.css">
</head>

<body>
    <header class="navbar">
        <div class="logo">
            <img src="../assets/images/Icon.png" /> Rikkei<span>Cinema</span>
        </div>
        <nav>
            <a href="#">Trang Chủ</a>
            <a href="#">Thông Tin</a>
            <a href="#">Liên Hệ</a>
            <button class="login-btn"><a href="login.html">Đăng Nhập</a></button>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-bg"></div>
        <div class="card">
            <h1 class="card-title">Tạo tài khoản mới</h1>
            <p class="card-sub">Đăng ký để đặt vé xem phim ngay hôm nay</p>

            <div class="input-group">
                <label for="fullname">Họ và tên</label>
                <div class="input-wrapper">
                    <input type="text" id="fullname" placeholder="Nguyễn Văn A" autocomplete="name" />
                </div>
            </div>

            <div class="input-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="email@example.com" autocomplete="email" />
                </div>
            </div>

            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="••••••" />
                    <button class="eye-btn" type="button" onclick="togglePass('password', this)">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="input-group">
                <label for="confirm">Xác nhận mật khẩu</label>
                <div class="input-wrapper">
                    <input type="password" id="confirm" placeholder="••••••" />
                    <button class="eye-btn" type="button" onclick="togglePass('confirm', this)">
                        <i class="fa-regular fa-eye-slash"></i>
                    </button>
                </div>
            </div>

            <div class="checkbox">
                <input type="checkbox" id="terms">
                <span class="box"></span>
                <label>Tôi đồng ý với <a href="#">điều khoản sử dụng</a> và chính sách bảo mật của CineEdu.</label>
            </div>

            <button class="submit-btn" onclick="handleRegister()">
                Đăng ký
                <i class="fa-solid fa-arrow-right"></i>
            </button>

            <p class="login-link">Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a></p>
        </div>

        <div class="footer">© 2026 RikkeiEdu. Tất cả quyền được bảo mật .</div>
    </div>
</body>

</html>
