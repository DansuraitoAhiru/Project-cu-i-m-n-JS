<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rikkei Cinema - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>

    <header class="navbar">
        <div class="logo">
            <img src="../assets/images/Icon.png"/> Rikkei<span>Cinema</span>
        </div>
        <nav>
            <a href="#">Trang Chủ</a>
            <a href="#">Thông Tin</a>
            <a href="#">Liên Hệ</a>
            <button class="login-btn"><a href="login.html">Đăng Nhập</a></button>
        </nav>
    </header>

    <div class="container">
        <div class="login-box">
            <div class="image-header">
                <img src="../assets/images/Background.png" class="popcorn" alt="popcorn">
            </div>

            <div class="form-content">
                <h2>Chào mừng quay trở <br>lại</h2>

                <form>
                    <div class="input-group">
                        <label>Email</label>
                        <div class="input-wrapper">
                            <input type="email" placeholder="Nhập email của bạn">
                            <i class="far fa-envelope"></i>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>Mật khẩu</label>
                        <div class="input-wrapper">
                            <input type="password" placeholder="Nhập mật khẩu của bạn">
                            <i class="far fa-eye"></i>
                        </div>
                    </div>

                    <div class="options">
                        <label class="remember-me">
                            <input type="checkbox">
                            <span class="box"></span> Ghi nhớ đăng nhập
                        </label>
                        <a href="#" class="forgot-pw">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="submit-btn">
                        Đăng nhập <i class="fas fa-sign-in-alt"></i>
                    </button>
                </form>

                <p class="register-text">
                    Bạn chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>
</body>
</html>
